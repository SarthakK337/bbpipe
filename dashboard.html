<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bbpipe dashboard</title>
<style>
  :root{--bg:#0f1115;--panel:#171a21;--panel2:#1e222b;--text:#e6e8ec;--muted:#9aa3b2;
    --border:#2a2f3a;--accent:#6ea8fe;--ok:#3fb950;--warn:#f0b429;--danger:#ff6b6b;
    --run:#4aa3ff;--cmd:#0b0d11}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-size:14px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 20px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
  header h1{font-size:1.05rem;margin:0;color:var(--accent);white-space:nowrap}
  header .sp{flex:1}
  input,select,textarea,button{font-family:inherit;font-size:13px}
  input[type=text]{background:var(--cmd);border:1px solid var(--border);color:var(--text);
    border-radius:7px;padding:7px 10px;min-width:220px}
  .scope-ok{color:var(--ok)} .scope-bad{color:var(--danger)}
  button{cursor:pointer;border:1px solid var(--border);background:var(--panel2);color:var(--text);
    border-radius:7px;padding:7px 12px;transition:.15s}
  button:hover{filter:brightness(1.2)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  button.danger{background:var(--danger);border-color:var(--danger);color:#fff}
  button.stop{background:var(--warn);border-color:var(--warn);color:#111;font-weight:600}
  button:disabled{opacity:.4;cursor:not-allowed}
  .layout{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 58px)}
  @media(max-width:900px){.layout{grid-template-columns:1fr;height:auto}}
  .wl-label{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12.5px}
  #wordlist{background:var(--cmd);border:1px solid var(--border);color:var(--text);border-radius:7px;
    padding:6px 8px;font-size:12px;max-width:240px}
  .batchbar{background:var(--panel);border-bottom:1px solid var(--border);padding:9px 16px}
  .batchbar summary{cursor:pointer;color:var(--accent);font-size:13px;font-weight:600;user-select:none}
  .batchbody{margin-top:11px;display:flex;flex-direction:column;gap:10px}
  #batchTargets{width:100%;min-height:82px;background:var(--cmd);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:9px;font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:12.5px;resize:vertical}
  .batchrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .batchrow select{background:var(--cmd);border:1px solid var(--border);color:var(--text);
    border-radius:7px;padding:6px 9px;font-size:12.5px}
  .filelbl{cursor:pointer;background:var(--panel2);border:1px solid var(--border);border-radius:7px;
    padding:7px 11px;font-size:12.5px}
  .filelbl:hover{border-color:var(--accent)}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;
    align-items:center;justify-content:center;padding:24px}
  .modal-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;
    width:min(920px,96vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
  .modal-body{padding:14px 16px;overflow-y:auto}
  .agrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:10px 0}
  @media(max-width:640px){.agrid{grid-template-columns:1fr}}
  .modal-body h4{margin:14px 0 6px;font-size:.9rem}
  .modal-body table{border-collapse:collapse;width:100%;font-size:12.5px;display:block;overflow-x:auto}
  .modal-body th,.modal-body td{border:1px solid var(--border);padding:5px 8px;text-align:left;white-space:nowrap}
  .modal-body th{background:var(--panel2);position:sticky;top:0}
  .modal-body td.u{white-space:normal;word-break:break-all;color:var(--muted)}
  .tag-noise{color:var(--warn);font-size:.72rem;border:1px solid var(--warn);border-radius:10px;padding:0 6px}
  .tag-real{color:var(--ok);font-size:.72rem;border:1px solid var(--ok);border-radius:10px;padding:0 6px}
  .realtbl td:first-child{font-weight:600}
  .rtbl{border-collapse:collapse;width:100%;font-size:12.5px}
  .rtbl th,.rtbl td{border:1px solid var(--border);padding:6px 9px;text-align:left;white-space:nowrap}
  .rtbl th{background:var(--panel2)}
  .rrow{cursor:pointer}
  .rrow:hover{background:var(--panel2)}
  .rrow.r-high{background:rgba(255,107,107,.10)}
  .rrow.r-high:hover{background:rgba(255,107,107,.18)}
  .rrow.r-med{background:rgba(240,180,52,.08)}
  .risk-high{color:#fff;background:var(--danger);border-radius:10px;padding:1px 9px;font-size:.72rem;font-weight:700}
  .risk-med{color:#111;background:var(--warn);border-radius:10px;padding:1px 9px;font-size:.72rem;font-weight:700}
  .risk-low{color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:1px 9px;font-size:.72rem}
  .idorlist{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;color:var(--muted);
    max-height:200px;overflow:auto;background:var(--cmd);border:1px solid var(--border);border-radius:8px;padding:9px;margin-top:6px}
  #resultsDetail h3{margin:20px 0 4px;color:var(--accent)}
  .steps{overflow-y:auto;padding:16px 18px;border-right:1px solid var(--border)}
  .console-wrap{display:flex;flex-direction:column;background:var(--cmd)}
  .phase{margin:6px 0 16px}
  .phase h2{font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);
    margin:14px 0 8px;border-bottom:1px solid var(--border);padding-bottom:5px}
  .step{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin:9px 0}
  .step.dangerous{border-color:#5c2b2b}
  .step-head{display:flex;align-items:center;gap:9px}
  .step-head .name{font-weight:600;flex:1}
  .badge{font-size:.68rem;padding:1px 7px;border-radius:20px;border:1px solid}
  .b-danger{color:var(--danger);border-color:var(--danger)}
  .b-builtin{color:var(--accent);border-color:var(--accent)}
  .pill{font-size:.68rem;padding:2px 9px;border-radius:20px;font-weight:600}
  .p-idle{background:var(--panel2);color:var(--muted)}
  .p-running{background:var(--run);color:#fff}
  .p-done{background:var(--ok);color:#fff}
  .p-failed{background:var(--danger);color:#fff}
  .p-blocked,.p-disabled{background:#3a3320;color:var(--warn)}
  .p-dry-run{background:#333;color:#ccc}
  .switch{position:relative;width:38px;height:20px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:var(--border);border-radius:20px;transition:.2s}
  .slider:before{content:"";position:absolute;height:14px;width:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked + .slider{background:var(--ok)}
  .switch input:checked + .slider:before{transform:translateX(18px)}
  .step-body{margin-top:9px;display:none}
  .step.open .step-body{display:block}
  .row{display:flex;gap:8px;align-items:center;margin:7px 0;flex-wrap:wrap}
  .info{font-size:.8rem;color:var(--muted)}
  textarea{width:100%;background:var(--cmd);border:1px solid var(--border);color:#e6e8ec;
    border-radius:7px;padding:9px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;resize:vertical}
  select{background:var(--cmd);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 9px}
  .toolbar{padding:10px 18px;border-bottom:1px solid var(--border);background:var(--panel);
    display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .toolbar label{display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--muted);cursor:pointer}
  .console{flex:1;overflow-y:auto;padding:12px 14px;font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:12.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .console .l-cmd{color:var(--accent)} .console .l-hdr{color:var(--warn);font-weight:600}
  .console .l-err{color:var(--danger)}
  .caret{cursor:pointer;color:var(--muted);user-select:none;width:12px}
  .disabled-step{opacity:.55}
  .del{background:#3a2222;border-color:#8f4f4f;color:#ffb3b3}
  .addcard{background:var(--panel);border:1px dashed var(--accent);border-radius:9px;padding:14px;margin:18px 0 30px}
  .addhead{font-weight:600;color:var(--accent);margin-bottom:10px}
  .astep-name,.astep-cmd{width:100%;background:var(--cmd);border:1px solid var(--border);color:#e6e8ec;
    border-radius:7px;padding:9px;margin-bottom:8px;font-size:13px}
  .astep-cmd{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;resize:vertical}
  .addhint{font-size:.8rem;color:var(--muted);margin-bottom:10px}
  .addhint code{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:.9em}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ok);color:#fff;
    padding:9px 18px;border-radius:8px;opacity:0;transition:.25s;pointer-events:none;font-weight:600}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <h1>⛓ bbpipe</h1>
  <input type="text" id="target" placeholder="domain or full URL — example.com or http://ffuf.me/cd/basic/">
  <span id="scopeState" class="info"></span>
  <span class="sp"></span>
  <label class="wl-label">wordlist:
    <select id="wordlist" title="wordlist used by content-discovery steps (ffuf/gobuster/…)"></select>
  </label>
  <button id="resultsBtn" class="primary" title="Overview of all scanned targets + drill-down analysis">📁 Results</button>
  <button id="reloadBtn" title="Reload pipeline.yaml from disk">↻ Reload config</button>
  <button id="toolsBtn">Check tools</button>
</header>

<div class="toolbar">
  <button class="primary" id="runAllBtn">▶ Run all enabled</button>
  <button id="runSelBtn">▶ Run selected</button>
  <button class="stop" id="stopBtn" disabled>■ Stop</button>
  <label><input type="checkbox" id="dryRun"> Dry-run (show, don't execute)</label>
  <label><input type="checkbox" id="allowDanger"> <span class="scope-bad">Allow dangerous steps</span></label>
  <span class="sp"></span>
  <span id="runState" class="info">idle</span>
</div>

<details class="batchbar" id="batchbar">
  <summary>▦ Batch mode — run many targets from a list / CSV</summary>
  <div class="batchbody">
    <textarea id="batchTargets" placeholder="one target per line — domain OR full URL&#10;example.com&#10;http://ffuf.me/cd/basic/&#10;https://api.example.com"></textarea>
    <div class="batchrow">
      <label class="filelbl">📄 Load CSV / txt<input type="file" id="csvFile" accept=".csv,.txt" hidden></label>
      <label>Batch size:
        <select id="batchConc">
          <option value="1">1 (one at a time)</option>
          <option value="3" selected>3 at a time</option>
          <option value="5">5 at a time</option>
          <option value="10">10 at a time</option>
          <option value="999">all at once</option>
        </select>
      </label>
      <span id="batchCount" class="info"></span>
      <span class="sp"></span>
      <button class="primary" id="runBatchBtn">▶ Run batch</button>
    </div>
    <div class="info" style="font-size:.8rem">Runs every <b>enabled</b> step against each target (honors Dry-run &amp; Allow-dangerous above). Out-of-scope targets are skipped. Each target → its own <code>output/&lt;host&gt;/</code>.</div>
  </div>
</details>

<div class="layout">
  <div class="steps" id="steps"></div>
  <div class="console-wrap">
    <div class="toolbar" style="border-bottom:1px solid var(--border)">
      <strong>Live output</strong><span class="sp"></span>
      <button id="analyzeBtn" class="primary" title="Group ffuf.json by status/size to separate real hits from false positives">📊 Analyze</button>
      <button id="clearBtn">Clear</button>
    </div>
    <div class="console" id="console"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="analyzeModal">
  <div class="modal-box">
    <div class="modal-head"><b>📊 ffuf analysis</b><span class="sp"></span><button id="analyzeClose">✕ Close</button></div>
    <div class="modal-body" id="analyzeBody"></div>
  </div>
</div>

<div class="modal" id="resultsModal">
  <div class="modal-box" style="width:min(1120px,97vw)">
    <div class="modal-head"><b>📁 Results Explorer</b>
      <label class="chk" style="margin-left:14px;color:var(--muted)"><input type="checkbox" id="onlyProblem"> only problematic</label>
      <button id="resultsRefresh" style="margin-left:8px">↻ Refresh</button>
      <span class="sp"></span><button id="resultsClose">✕ Close</button></div>
    <div class="modal-body">
      <div id="resultsOverview"></div>
      <div id="resultsDetail"></div>
    </div>
  </div>
</div>

<script>
let CONFIG=null, lastLine=0, poll=null, TOOLS={};
const $=id=>document.getElementById(id);
const toast=t=>{const el=$('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500);};

async function api(path,opts){const r=await fetch(path,opts);return r.json();}

async function loadConfig(){
  CONFIG=await api('/api/config');
  TOOLS=await api('/api/tools');
  if(CONFIG.target && !$('target').value) $('target').value=CONFIG.target;
  renderScope();
  render();
  checkScope();
  loadWordlists();
}

async function loadWordlists(){
  const w=await api('/api/wordlists');
  const sel=$('wordlist');
  sel.innerHTML=(w.options||[]).map(o=>
    `<option value="${o.path}" ${o.path===w.current?'selected':''}>${o.label}</option>`).join('');
  sel.onchange=async()=>{
    const r=await api('/api/wordlist',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({path:sel.value})});
    toast(r.error?('⚠ '+r.error):('wordlist: '+sel.value.split('/').pop()));
  };
}

function renderScope(){
  const s=CONFIG.scope;
  const txt = s.exists ? `scope: ${s.in_scope.length} in / ${s.out_of_scope.length} out (${s.path})`
                       : `no ${s.path} — all targets allowed (add one!)`;
  $('scopeState').textContent='';
}

function statusPill(st){const s=st||'idle';return `<span class="pill p-${s}">${s}</span>`;}

function render(){
  const c=$('steps');c.innerHTML='';
  CONFIG.phases.forEach(ph=>{
    const pd=document.createElement('div');pd.className='phase';
    pd.innerHTML=`<h2>${ph.name}</h2>`;
    ph.steps.forEach(st=>pd.appendChild(stepCard(st)));
    c.appendChild(pd);
  });
  c.appendChild(addStepCard());
}

function addStepCard(){
  const d=document.createElement('div');
  d.className='addcard';
  d.innerHTML=`
    <div class="addhead">➕ Add your own step</div>
    <input class="astep-name" type="text" placeholder="step name — e.g. My custom nikto scan">
    <textarea class="astep-cmd" rows="2" placeholder="command — e.g.  nikto -h {target_url} -o {out}/mynikto.txt"></textarea>
    <div class="addhint">placeholders you can use: <code>{target}</code> <code>{target_url}</code> <code>{out}</code> <code>{wordlist}</code></div>
    <button class="astep-add primary">＋ Add step</button>`;
  d.querySelector('.astep-add').onclick=async()=>{
    const name=d.querySelector('.astep-name').value.trim();
    const command=d.querySelector('.astep-cmd').value.trim();
    if(!command){toast('enter a command first');return;}
    const r=await api('/api/add-step',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,command})});
    if(r.error){toast('⚠ '+r.error);return;}
    toast('step added ✓'); await loadConfig();
  };
  return d;
}

function stepCard(st){
  const d=document.createElement('div');
  d.className='step'+(st.dangerous?' dangerous':'')+(st.enabled===false?' disabled-step':'')+(st.custom?' open':'');
  d.dataset.id=st.id;
  const builtin=!!st.builtin;
  const toolBin=(st.tool||'').split(' ')[0];
  const toolMissing=!builtin && TOOLS[toolBin]===false;

  const alts=[{tool:st.tool,command:st.command||''}].concat(st.alternatives||[]);
  const opts=alts.map((a,i)=>`<option value="${i}">${a.tool}${TOOLS[a.tool.split(' ')[0]]===false?' (missing)':''}</option>`).join('');

  d.innerHTML=`
    <div class="step-head">
      <span class="caret">▸</span>
      <input type="checkbox" class="sel" title="select for 'Run selected'">
      <label class="switch"><input type="checkbox" class="en" ${st.enabled!==false?'checked':''}><span class="slider"></span></label>
      <span class="name">${st.name||st.id}</span>
      ${st.dangerous?'<span class="badge b-danger">dangerous</span>':''}
      ${builtin?'<span class="badge b-builtin">built-in</span>':(toolMissing?'<span class="badge b-danger">not installed</span>':'')}
      <span class="stat">${statusPill('idle')}</span>
    </div>
    <div class="step-body">
      ${st.info?`<div class="info">${st.info}</div>`:''}
      ${builtin?'':`
        <div class="row">
          ${st.custom?'':`<span class="info">tool:</span><select class="tool">${opts}</select>`}
          <button class="runOne primary">▶ Run this step</button>
          <button class="save">💾 Save</button>
          ${st.custom?'<button class="del">🗑 Delete</button>':''}
        </div>
        <textarea class="cmd" rows="2">${(st.command||'').replace(/</g,'&lt;')}</textarea>
      `}
      ${builtin?`<div class="row"><button class="runOne primary">▶ Run this step</button></div>`:''}
    </div>`;

  // expand/collapse
  const toggle=()=>d.classList.toggle('open');
  d.querySelector('.caret').onclick=toggle;
  d.querySelector('.name').onclick=toggle;

  // enable toggle -> persist
  d.querySelector('.en').onchange=async e=>{
    await api('/api/step',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:st.id,enabled:e.target.checked})});
    d.classList.toggle('disabled-step',!e.target.checked);
    toast('saved');
  };

  // Save the step's CURRENT command/tool to the backend (so runs use what you see).
  const saveStep=async(silent)=>{
    if(builtin) return;
    const cmd=d.querySelector('.cmd'), tool=d.querySelector('.tool');
    const payload={id:st.id, command:cmd.value};
    if(tool) payload.tool=alts[tool.value].tool;
    await api('/api/step',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)});
    if(!silent) toast('saved ✓');
  };

  if(!builtin){
    const cmd=d.querySelector('.cmd'), tool=d.querySelector('.tool');
    // Changing the tool updates the command AND auto-saves it — no separate Save needed.
    if(tool) tool.onchange=async()=>{
      cmd.value=alts[tool.value].command;
      await saveStep(true);
      toast('tool → '+alts[tool.value].tool+' (saved)');
    };
    d.querySelector('.save').onclick=()=>saveStep(false);
    const del=d.querySelector('.del');
    if(del) del.onclick=async()=>{
      if(!confirm('Delete this custom step?'))return;
      const r=await api('/api/delete-step',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:st.id})});
      if(r.error){toast('⚠ '+r.error);return;}
      toast('deleted'); await loadConfig();
    };
  }
  // Running a step saves its current command first, so it always runs what you see.
  d.querySelector('.runOne').onclick=async()=>{ await saveStep(true); run([st.id]); };
  return d;
}

async function checkScope(){
  const t=$('target').value.trim();
  if(!t){$('scopeState').textContent='';return;}
  const r=await api('/api/scope-check?target='+encodeURIComponent(t));
  $('scopeState').innerHTML=r.allowed?'<span class="scope-ok">✓ in scope</span>'
                                     :'<span class="scope-bad">✗ NOT in scope — will be refused</span>';
}
$('target').addEventListener('input',()=>{clearTimeout(window._st);window._st=setTimeout(checkScope,300);});

async function run(stepIds){
  const target=$('target').value.trim();
  if(!target){toast('enter a target');return;}
  const body={target,step_ids:stepIds,dry_run:$('dryRun').checked,allow_dangerous:$('allowDanger').checked};
  const r=await api('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.error){toast('⚠ '+r.error);return;}
  lastLine=0;$('console').innerHTML='';startPolling();
}

$('runAllBtn').onclick=()=>run(null);
$('runSelBtn').onclick=()=>{
  const ids=[...document.querySelectorAll('.sel:checked')].map(c=>c.closest('.step').dataset.id);
  if(!ids.length){toast('select some steps first');return;}
  run(ids);
};
$('stopBtn').onclick=async()=>{await api('/api/stop',{method:'POST'});toast('stopping…');};
$('clearBtn').onclick=()=>{$('console').innerHTML='';};

// ---- ffuf analysis ----
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
$('analyzeBtn').onclick=async()=>{
  const t=$('target').value.trim();
  if(!t){toast('enter a target first');return;}
  const r=await api('/api/analyze?target='+encodeURIComponent(t));
  if(r.error){toast('⚠ '+r.error);return;}
  renderAnalysis(r);
  $('analyzeModal').style.display='flex';
};
$('analyzeClose').onclick=()=>{$('analyzeModal').style.display='none';};
$('analyzeModal').onclick=e=>{if(e.target===$('analyzeModal'))$('analyzeModal').style.display='none';};
function renderAnalysis(a){
  const noise=new Set(a.noise_sizes);
  const dc=a.dominant_status||{};
  const statusRows=a.by_status.map(s=>
    `<tr><td>${s.code}</td><td>${s.count}</td><td>${dc.is_catchall&&s.code===dc.code?'<span class="tag-noise">catch-all?</span>':''}</td></tr>`).join('');
  const sizeRows=a.by_size.map(s=>
    `<tr><td>${s.size}</td><td>${s.count}</td><td>${noise.has(s.size)?'<span class="tag-noise">noise</span>':'<span class="tag-real">keep</span>'}</td></tr>`).join('');
  const realRows=a.likely_real.map(r=>
    `<tr><td>${esc(r.word)}</td><td>${r.status}</td><td>${r.size}</td><td class="u">${esc(r.url)}</td></tr>`).join('');
  $('analyzeBody').innerHTML=`
    <p class="info">${a.total} total results.${dc.is_catchall?` <b class="scope-bad">Status ${dc.code} covers ${Math.round(dc.count/a.total*100)}% — looks like a catch-all (false positives).</b>`:''}
      Sizes repeated more than a few times are flagged as noise.</p>
    <div class="agrid">
      <div><h4>By status code</h4><table><tr><th>code</th><th>count</th><th></th></tr>${statusRows}</table></div>
      <div><h4>By response size (top 25)</h4><table><tr><th>size</th><th>count</th><th></th></tr>${sizeRows}</table></div>
    </div>
    <h4>✅ Likely real — ${a.likely_count} result(s) (sizes that don't repeat)</h4>
    <table class="realtbl"><tr><th>word</th><th>status</th><th>size</th><th>url</th></tr>${realRows||'<tr><td colspan="4">nothing stood out — every result matched a repeated size (all noise)</td></tr>'}</table>`;
}

// ---- Results Explorer (all targets) ----
$('resultsBtn').onclick=async()=>{await loadResults(); $('resultsModal').style.display='flex';};
$('resultsClose').onclick=()=>{$('resultsModal').style.display='none';};
$('resultsRefresh').onclick=loadResults;
$('resultsModal').onclick=e=>{if(e.target===$('resultsModal'))$('resultsModal').style.display='none';};
$('onlyProblem').onchange=()=>renderOverview(window._results||[]);
async function loadResults(){
  const r=await api('/api/results'); window._results=r.hosts||[];
  renderOverview(window._results); $('resultsDetail').innerHTML='';
}
function nucleiCell(n){
  if(!n.total) return '—';
  return [n.critical?`🔴${n.critical}C`:'',n.high?`🔴${n.high}H`:'',n.medium?`🟠${n.medium}M`:'',
          n.low?`🟡${n.low}L`:'',n.info?`⚪${n.info}`:''].filter(Boolean).join(' ');
}
function renderOverview(hosts){
  const only=$('onlyProblem').checked;
  const rows=hosts.filter(h=>!only||h.risk!=='low').map(h=>
    `<tr class="rrow r-${h.risk}" data-host="${esc(h.host)}">
      <td>${esc(h.host)}</td><td>${h.live?'✅':'—'}</td><td>${h.ffuf_real}</td>
      <td>${nucleiCell(h.nuclei)}</td><td>${h.idor}</td>
      <td><span class="risk-${h.risk}">${h.risk.toUpperCase()}</span></td></tr>`).join('');
  $('resultsOverview').innerHTML=
    `<table class="rtbl"><tr><th>host</th><th>live</th><th>paths</th><th>nuclei</th><th>IDOR</th><th>risk</th></tr>`
    +(rows||'<tr><td colspan="6">no results yet — run a scan or batch first</td></tr>')+`</table>`
    +`<p class="info" style="margin-top:8px">Click a row to see that target’s full analysis ↓</p>`;
  document.querySelectorAll('.rrow').forEach(tr=>tr.onclick=()=>loadDetail(tr.dataset.host));
}
async function loadDetail(host){
  const r=await api('/api/results-detail?host='+encodeURIComponent(host));
  if(r.error){toast('⚠ '+r.error);return;}
  let h=`<h3>🔎 ${esc(host)}</h3>`;
  if(r.nuclei){
    const b=r.nuclei.by_severity;
    h+=`<h4>nuclei — ${r.nuclei.total} finding(s)</h4>`
      +`<p class="info">critical ${b.critical} · high ${b.high} · medium ${b.medium} · low ${b.low} · info ${b.info}</p>`;
    if(r.nuclei.findings.length) h+=`<table><tr><th>sev</th><th>template</th><th>matched at</th></tr>`
      +r.nuclei.findings.map(f=>`<tr><td>${esc(f.severity)}</td><td>${esc(f.template)}</td><td class="u">${esc(f.matched_at)}</td></tr>`).join('')+`</table>`;
  }
  if(r.ffuf){
    h+=`<h4>ffuf — ${r.ffuf.likely_count} likely-real path(s)</h4>`;
    if(r.ffuf.likely_real.length) h+=`<table><tr><th>word</th><th>status</th><th>size</th></tr>`
      +r.ffuf.likely_real.map(x=>`<tr><td>${esc(x.word)}</td><td>${x.status}</td><td>${x.size}</td></tr>`).join('')+`</table>`;
  }
  if(r.idor&&r.idor.length){
    h+=`<h4>IDOR candidates — ${r.idor.length} (test manually)</h4><div class="idorlist">`
      +r.idor.slice(0,80).map(esc).join('<br>')+`</div>`;
  }
  if(!r.nuclei&&!r.ffuf&&!(r.idor&&r.idor.length)) h+=`<p class="info">No parseable results for this host yet.</p>`;
  $('resultsDetail').innerHTML=h;
  $('resultsDetail').scrollIntoView({behavior:'smooth',block:'start'});
}

// ---- Batch mode (many targets) ----
function batchTargetList(){
  return $('batchTargets').value.split(/\n/).map(l=>l.split(',')[0].trim())
    .filter(l=>l && !l.startsWith('#'));
}
function updateBatchCount(){
  const n=batchTargetList().length;
  $('batchCount').textContent=n?`${n} target${n>1?'s':''}`:'';
}
$('batchTargets').addEventListener('input',updateBatchCount);
$('csvFile').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    const lines=rd.result.split(/\r?\n/).map(l=>l.split(',')[0].trim()).filter(l=>l&&!l.startsWith('#'));
    $('batchTargets').value=lines.join('\n'); updateBatchCount();
    toast(lines.length+' targets loaded from '+f.name);
  };
  rd.readAsText(f);
};
$('runBatchBtn').onclick=async()=>{
  const targets=batchTargetList();
  if(!targets.length){toast('add some targets first');return;}
  const r=await api('/api/run-batch',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({targets, concurrency:parseInt($('batchConc').value),
      dry_run:$('dryRun').checked, allow_dangerous:$('allowDanger').checked})});
  if(r.error){toast('⚠ '+r.error);return;}
  lastLine=0; $('console').innerHTML=''; startPolling();
  toast('batch started: '+r.count+' targets');
};
$('reloadBtn').onclick=async()=>{await api('/api/reload',{method:'POST'});await loadConfig();toast('config reloaded');};
$('toolsBtn').onclick=async()=>{TOOLS=await api('/api/tools');render();
  const miss=Object.entries(TOOLS).filter(([k,v])=>!v).map(([k])=>k);
  toast(miss.length?('missing: '+miss.join(', ')):'all tools installed ✓');};

function startPolling(){
  if(poll)clearInterval(poll);
  poll=setInterval(updateStatus,900);updateStatus();
}
async function updateStatus(){
  const s=await api('/api/status?since='+lastLine);
  const con=$('console');
  s.lines.forEach(l=>{
    lastLine=l.i+1;
    const div=document.createElement('div');
    div.textContent=l.text;
    if(l.text.startsWith('$ '))div.className='l-cmd';
    else if(l.text.startsWith('── '))div.className='l-hdr';
    else if(/error|refus|fail|blocked/i.test(l.text))div.className='l-err';
    con.appendChild(div);
  });
  if(s.lines.length)con.scrollTop=con.scrollHeight;
  // update pills
  document.querySelectorAll('.step').forEach(st=>{
    const status=s.results[st.dataset.id];
    if(status)st.querySelector('.stat').innerHTML=statusPill(status);
  });
  // status line — batch progress if a batch is running, else single-run state
  const bh=s.batch?Object.values(s.batch):[];
  if(bh.length){
    const done=bh.filter(x=>x==='done').length;
    const oos=bh.filter(x=>x==='out-of-scope').length;
    $('runState').textContent=`batch: ${done}/${bh.length} done`+(oos?` (${oos} out-of-scope)`:'')+(s.running?' …':'');
  } else {
    $('runState').textContent=s.running?('running: '+(s.current||'')):'idle';
  }
  $('stopBtn').disabled=!s.running;
  $('runAllBtn').disabled=s.running;$('runSelBtn').disabled=s.running;
  $('runBatchBtn').disabled=s.running;
  if(!s.running&&poll){clearInterval(poll);poll=null;}
}

loadConfig();
setInterval(()=>{if(!poll)updateStatus();},2000); // keep pills fresh when idle
</script>
</body>
